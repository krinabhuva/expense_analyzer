<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Analytics Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#4f46e5,#7c3aed);padding:30px}
.container{max-width:1200px;margin:auto;background:#fff;padding:30px;border-radius:20px}
h1{text-align:center;color:#4f46e5}
.row{display:flex;gap:10px;margin:10px 0}
input{flex:1;padding:12px}
button{padding:12px 18px;border:none;border-radius:8px;background:#4f46e5;color:#fff;cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:20px}
.card{background:#eef2ff;padding:20px;border-radius:12px;text-align:center}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:25px}
.chart{background:#f8fafc;padding:15px;border-radius:12px;text-align:center}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
th{background:#4f46e5;color:white}
.insight{margin-top:20px;background:#eef2ff;padding:15px;border-radius:10px}
</style>
</head>
<body>
<div class="container">
<h1>💰 Expense Analytics Dashboard</h1>

<form method="POST" id="expenseForm">
<div id="rows">
<div class="row">
<input type="text" name="category" placeholder="Category" required>
<input type="number" name="amount" placeholder="Amount" required>
</div>
</div>

<button type="button" onclick="addRow()">+ Add Expense</button>
<button type="submit">Generate Analytics</button>
</form>

{% if pie_chart %}
<div class="cards">
<div class="card"><h3>Total Expense</h3><h2>₹{{ total }}</h2></div>
<div class="card"><h3>Average Expense</h3><h2>₹{{ average }}</h2></div>
<div class="card"><h3>Highest Category</h3><h2>{{ highest_category }}</h2></div>
</div>

<div class="insight"><strong>Insight:</strong> {{ insight }}</div>

<table>
<tr><th>Category</th><th>Amount</th></tr>
{% for e in expenses %}
<tr><td>{{ e.Category }}</td><td>₹{{ e.Amount }}</td></tr>
{% endfor %}
</table>

<div class="charts">
<div class="chart">
<h3>Pie Chart</h3>
<img src="data:image/png;base64,{{ pie_chart }}" width="100%">
</div>
<div class="chart">
<h3>Bar Chart</h3>
<img src="data:image/png;base64,{{ bar_chart }}" width="100%">
</div>
</div>
{% endif %}
</div>

<script>
function addRow(){
const div=document.createElement('div');
div.className='row';
div.innerHTML=`<input type="text" name="category" placeholder="Category" required>
<input type="number" name="amount" placeholder="Amount" required>`;
document.getElementById('rows').appendChild(div);
}
</script>
</body>
</html>
